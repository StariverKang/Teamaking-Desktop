<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TEAMAKING Desktop</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f2ecdf;
        --chalk: #fbf7ed;
        --ink: #11130f;
        --rust: #8f382b;
        --forest: #233d31;
        --mist: #e0d7c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(35, 61, 49, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(35, 61, 49, 0.045) 1px, transparent 1px),
          var(--paper);
        background-size: 28px 28px;
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100vw - 40px));
        border: 1px solid rgba(17, 19, 15, 0.72);
        background: rgba(251, 247, 237, 0.9);
        padding: 32px;
        box-shadow: 0 22px 60px rgba(17, 19, 15, 0.1);
      }

      .mark {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        margin-bottom: 22px;
        background: var(--ink);
        color: var(--paper);
        font-size: 22px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--rust);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 7vw, 58px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        margin: 20px 0 0;
        max-width: 58ch;
        font-size: 16px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      button,
      a {
        min-height: 44px;
        border: 1px solid var(--ink);
        padding: 10px 16px;
        color: inherit;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }

      button {
        background: var(--ink);
        color: var(--paper);
        cursor: pointer;
      }

      a {
        background: var(--mist);
      }

      .target {
        margin-top: 18px;
        word-break: break-all;
        color: rgba(17, 19, 15, 0.58);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">✦</div>
      <p class="eyebrow" id="eyebrow">TEAMAKING Desktop</p>
      <h1 id="title">TEAMAKING is offline</h1>
      <p id="description">TEAMAKING Desktop needs an internet connection to load the website.</p>
      <p class="target" id="target"></p>
      <div class="actions">
        <button type="button" id="retry">Retry</button>
        <a id="open" href="https://teamingapp.org">Open in browser</a>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "https://teamingapp.org";
      const mode = params.get("mode") || "offline";
      document.getElementById("eyebrow").textContent = mode === "blocked" ? "USER APP ONLY" : "NETWORK REQUIRED";
      document.getElementById("title").textContent = params.get("title") || "TEAMAKING is offline";
      document.getElementById("description").textContent = params.get("description") || "TEAMAKING Desktop needs an internet connection to load the website.";
      document.getElementById("target").textContent = target;
      document.getElementById("open").href = target;
      document.getElementById("retry").addEventListener("click", () => {
        window.location.href = target;
      });
    </script>
  </body>
</html>
