<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
  </head>
  <body style="margin:0;padding:0;background:#ffffff;color:#0f172a;">
    <div style="font-family:Inter,Arial,sans-serif;line-height:1.6;color:#0f172a;">
      <h1 style="margin:0 0 16px;font-size:22px;">{{title}}</h1>
      <p style="margin:0 0 16px;color:#475569;">学校：{{schoolName}}</p>
      <p style="margin:0 0 16px;color:#475569;">登录邮箱：{{email}}</p>
      <p style="margin:0 0 12px;">请输入下面的 6 位验证码{{action}}：</p>
      <p style="margin:0 0 16px;font-size:30px;font-weight:700;letter-spacing:6px;">{{code}}</p>
      <p style="margin:0;color:#64748b;">验证码 10 分钟内有效。如果不是你本人操作，可以忽略这封邮件。</p>
    </div>
  </body>
</html>
